<!-- Hero -->
<section id="home" class="hero" [lang]="i18n.lang()">
  <!-- Decorative background: temple silhouette, corner mandalas, diyas -->
  <div class="hero-decor" aria-hidden="true">
    <svg class="decor-svg" viewBox="0 0 1600 620" preserveAspectRatio="xMidYMid slice">
      <defs>
        <radialGradient id="sky" cx="50%" cy="40%" r="75%">
          <stop offset="0" stop-color="#9c3a14" />
          <stop offset="55%" stop-color="#7a1f12" />
          <stop offset="100%" stop-color="#3c0e07" />
        </radialGradient>
        <linearGradient id="temple" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#2a0a05" stop-opacity="0.85" />
          <stop offset="1" stop-color="#1a0603" stop-opacity="0.95" />
        </linearGradient>
        <g id="mandala">
          <circle r="150" fill="none" stroke="#f3d27a" stroke-width="2" opacity="0.5" />
          <circle r="120" fill="none" stroke="#f3d27a" stroke-width="1.5" opacity="0.45" />
          <circle r="86" fill="none" stroke="#f3d27a" stroke-width="1" opacity="0.4" />
          <g fill="#f3d27a" opacity="0.4">
            <!-- petal ring -->
            <g id="petals">
              <path d="M0 -150 q14 22 0 44 q-14 -22 0 -44z" />
            </g>
            <use href="#petals" transform="rotate(30)" />
            <use href="#petals" transform="rotate(60)" />
            <use href="#petals" transform="rotate(90)" />
            <use href="#petals" transform="rotate(120)" />
            <use href="#petals" transform="rotate(150)" />
            <use href="#petals" transform="rotate(180)" />
            <use href="#petals" transform="rotate(210)" />
            <use href="#petals" transform="rotate(240)" />
            <use href="#petals" transform="rotate(270)" />
            <use href="#petals" transform="rotate(300)" />
            <use href="#petals" transform="rotate(330)" />
          </g>
        </g>
        <g id="diya">
          <ellipse cx="0" cy="14" rx="34" ry="9" fill="#1a0603" opacity="0.6" />
          <path d="M-30 6 q30 16 60 0 q-6 12 -30 12 q-24 0 -30 -12z" fill="#c8860d" />
          <path d="M0 6 q5 -22 0 -34 q-12 14 0 34z" fill="#ffd24a" />
          <path d="M0 2 q3 -13 0 -20 q-7 9 0 20z" fill="#fff3c4" />
        </g>
      </defs>

      <!-- sky -->
      <rect width="1600" height="620" fill="url(#sky)" />

      <!-- corner mandalas -->
      <use href="#mandala" x="60" y="60" />
      <use href="#mandala" x="1540" y="60" />
      <use href="#mandala" x="60" y="600" />
      <use href="#mandala" x="1540" y="600" />

      <!-- central temple gopuram silhouette -->
      <g fill="url(#temple)">
        <rect x="690" y="560" width="220" height="60" />
        <polygon points="700,560 900,560 880,470 720,470" />
        <polygon points="715,470 885,470 868,395 732,395" />
        <polygon points="730,395 870,395 855,330 745,330" />
        <polygon points="745,330 855,330 842,275 758,275" />
        <polygon points="758,275 842,275 831,230 769,230" />
        <rect x="785" y="200" width="30" height="30" />
        <circle cx="800" cy="190" r="16" />
        <rect x="796" y="150" width="8" height="44" />
        <!-- doorway -->
      </g>
      <rect x="775" y="500" width="50" height="60" rx="25" fill="#ffb347" opacity="0.25" />

      <!-- diyas flanking the temple -->
      <use href="#diya" x="470" y="540" />
      <use href="#diya" x="1130" y="540" />
    </svg>
    <!-- Optional real photo background: drop assets/hero-bg.jpg to override the art above -->
    <div class="hero-photo-bg"></div>
    <div class="hero-fade"></div>
  </div>

  <div class="container hero-grid">
    <!-- Acharya Ji photo on the right -->
    <div class="hero-photo">
      <div class="photo-frame">
        <img src="assets/acharya-hero.jpeg"
             (error)="$any($event.target).src='assets/Profile-pic-2.jpeg'"
             [alt]="i18n.t('hero.photoAlt')" />
      </div>
    </div>
    <div class="hero-content">
      <span class="hero-om" aria-hidden="true">ॐ</span>
      <span class="hero-welcome">{{ i18n.t('hero.welcome') }}</span>
      <h1 class="hero-domain">utkarshacharyaji.com</h1>
      <p class="hero-subtitle">{{ i18n.t('hero.subtitle') }}</p>
      <p class="hero-contact-line">{{ i18n.t('hero.contactLine') }}</p>
      <div class="hero-actions">
        <button class="btn btn-hero" type="button" (click)="scrollTo('connect')">
          {{ i18n.t('hero.cta') }}
        </button>
        <button class="btn btn-ghost hero-ghost" type="button" (click)="scrollTo('services')">
          {{ i18n.t('hero.ctaServices') }}
        </button>
      </div>
    </div>

    
  </div>
</section>

<app-services></app-services>

<app-contact-form></app-contact-form>
